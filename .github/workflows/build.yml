name: Build ABCGuard.dylib
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dylib
        run: |
          xcodebuild -create-xcframework \
            -library <(xcrun --sdk iphoneos swiftc \
              -emit-library -o ABCGuard.dylib -module-name ABCGuard \
              -Xcc -fobjc-arc \
              -framework UIKit -framework WebKit \
              ABCGuard.swift \
              && echo "$PWD/ABCGuard.dylib") \
            -output ABCGuard.xcframework
          mv ABCGuard.xcframework/ios-arm64/ABCGuard.dylib .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ABCGuard.dylib
          path: ABCGuard.dylib
